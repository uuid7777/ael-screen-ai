name: Build AEL Screen AI APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Build APK
        run: |
          cd ael_screen_ai
          flutter pub get
          rm -f .flutter-plugins
          rm -f android/app/src/debug/AndroidManifest.xml
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ael-screen-ai-apk
          path: ael_screen_ai/build/app/outputs/flutter-apk/*.apk
          retention-days: 30