name: Build AEL Screen AI APK

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Install dependencies
        working-directory: ael_screen_ai
        run: flutter pub get

      - name: Build APK
        working-directory: ael_screen_ai
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ael-screen-ai-apk
          path: ael_screen_ai/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Build App Bundle (optional)
        working-directory: ael_screen_ai
        run: flutter build appbundle --release

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ael-screen-ai-aab
          path: ael_screen_ai/build/app/outputs/bundle/release/*.aab
          retention-days: 30
