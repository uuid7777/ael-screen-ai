name: Build AEL Screen AI APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4

      - name: Regenerate Android project
        working-directory: ael_screen_ai
        run: |
          flutter create --platforms android --project-name ael_screen_ai --org com.ael .
          flutter pub get

      - name: Build APK
        working-directory: ael_screen_ai
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ael-screen-ai-apk
          path: ael_screen_ai/build/app/outputs/flutter-apk/*.apk
          retention-days: 30