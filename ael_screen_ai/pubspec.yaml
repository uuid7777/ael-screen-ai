name: ael_screen_ai
description: AEL Screen AI - AI-powered screen translation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Supabase
  supabase_flutter: ^2.8.1

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3

  # Image & OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0

  # UI
  gap: ^3.0.1
  cached_network_image: ^3.4.1
  loading_animation_widget: ^1.3.0
  shimmer: ^3.0.0

  # Utilities
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Medium.otf
          weight: 500
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700

  generate: true
